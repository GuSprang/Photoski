# ─────────────────────────────────────────────────────────────
# Photoski — configuração principal
# Coloque este arquivo em: /etc/photoski/photoski.properties
# ─────────────────────────────────────────────────────────────

# Pasta onde as fotos e vídeos ficam armazenados permanentemente.
# Use um caminho absoluto fora do Tomcat.
storage.path=/home/gusta/photoski/storage

# Pasta de destino dos backups automáticos.
# Idealmente um HD externo ou pasta de rede montada.
backup.path=/home/gusta/photoski/backup

# Hora do dia para rodar o backup automático (formato HH no padrão 24h).
backup.hour=3

# Tamanho máximo por arquivo em bytes (padrão: 500 MB).
upload.max.bytes=524288000
